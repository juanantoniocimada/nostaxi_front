<app-header></app-header>

<div class="card" style="margin-top: 8em;">

  <h1>APP NOSTAXI.COM - Cabo Verde</h1>

  <h2>
    Estamos à procura de taxistas para testar a futura APP NOSTAXI.
  </h2>

  <h3>
    Os primeiros taxistas a testar a NOSTAXI.COM terão vantagens especiais na plataforma.
  </h3>

  <p style="font-size: larger;">Deixe os seus dados</p>

  <input placeholder="Nome do Condutor:" type="text" id="driverName" class="input-field" [(ngModel)]="taxi.nome" />

  <input placeholder="WhatsApp do Condutor:" type="number" id="driverPhone" class="input-field"
    [(ngModel)]="taxi.whatsapp" />

  <div>
    <label for="ilha">Ilha onde presta serviço:</label>
  
    <select class="input-field" id="ilha" [(ngModel)]="taxi.ilha">
  
      <option value="Santo Antão">Santo Antão</option>
      <option value="São Vicente">São Vicente</option>
      <option value="São Nicolau">São Nicolau</option>
      <option value="Sal">Sal</option>
      <option value="Boa Vista">Boa Vista</option>
      <option value="Maio">Maio</option>
      <option value="Santiago">Santiago</option>
      <option value="Fogo">Fogo</option>
      <option value="Brava">Brava</option>
  
    </select>
  </div>

  <p style="font-size: larger;">
    Clique no botão azul para enviar os seus dados.
  </p>

</div>

<div class="btn-outline">
  <button type="button" (click)="registerTaxi()">
    Tenho interesse
  </button>
</div>
