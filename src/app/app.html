<div class="app-header">

  <h1 class="main-title">
    {{ title() }}  <img
    class="header-flag"
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Flag_of_Cape_Verde.svg/330px-Flag_of_Cape_Verde.svg.png"
    alt="Cape Verde flag"
  />
  </h1>
  <h2 class="main-subtitle">
    O futuro do táxi em Cabo Verde.
  </h2>
</div>

<div>
  latitude: {{ latitude }} <br>
  longitude: {{ longitude }}
</div>

<!-- Map Section -->
  <div class="map-section">
    <app-map
      *ngIf="hasLocation"
      [mapTileUrl]="tileLayerUrl"
      [center]="[latitude, longitude]"
      [routeColor]="routeColor"
      [user]="userDivIcon"
      [bus]="bus"
      [stop]="stop"
      [stopDisabled]="stopDisabled"
      (stopClick)="stopClick($event)"
      (lineClick)="lineClick($event)"
    >
    </app-map>

    <div *ngIf="!hasLocation">Obteniendo ubicacion...</div>
  </div>
